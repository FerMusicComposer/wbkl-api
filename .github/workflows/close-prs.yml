name: Auto-close PRs
on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  close-pr:
    runs-on: ubuntu-latest
    # This line ensures it only runs if the PR author is NOT the repo owner
    if: github.event.pull_request.user.login != github.repository_owner
    permissions:
      pull-requests: write 
    steps:
      - name: Close PR
        uses: superbrothers/close-pull-request@v3
        with:
          comment: "Thank you for your interest! However, this is a read-only personal project and I do not accept Pull Requests. This PR has been closed automatically."
